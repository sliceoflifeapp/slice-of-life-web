<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:transparent}
body{font-family:'Montserrat',system-ui,sans-serif;color:#fff}
:root{--white:#FFFFFF;--blue-muted:#7FB8FF;}
.wrap{width:460px;padding:0;}
.mockup-window{width:100%;border-radius:14px;background:#040F1D;border:1px solid rgba(255,255,255,0.09);
 box-shadow:0 0 0 1px rgba(0,0,0,0.5);overflow:hidden;}
.mockup-titlebar{height:44px;background:rgba(255,255,255,0.025);border-bottom:1px solid rgba(255,255,255,0.055);display:flex;align-items:center;padding:0 16px;position:relative;}
.mockup-dots{display:flex;gap:6px;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-red{background:#FF5F57;}.dot-yellow{background:#FEBC2E;}.dot-green{background:#28C840;}
.mockup-title{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:500;color:rgba(80,128,192,0.7);}
.mockup-body{padding:36px 20px 20px;display:flex;flex-direction:column;gap:16px;}
.mockup-card{border-radius:14px;background:rgba(50,110,225,0.16);border:1px solid rgba(120,185,255,0.24);
 box-shadow:inset 0 1px 0 rgba(255,255,255,0.12),0 8px 24px rgba(30,80,200,0.16);padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;}
.mockup-card-title{font-size:16px;font-weight:700;letter-spacing:0.07em;color:var(--white);}
.mockup-card-desc{font-size:11px;color:var(--blue-muted);line-height:1.55;}
.mockup-streak{display:flex;align-items:center;gap:12px;}
.mockup-streak-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);}
.mockup-streak-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.4);white-space:nowrap;}
.mockup-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.mockup-thumb{height:50px;border-radius:8px;overflow:hidden;background:rgba(255,255,255,0.04);}
.mockup-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
</style></head><body>
<div class="wrap"><div class="mockup-window">
<div class="mockup-titlebar"><div class="mockup-dots"><span class="dot dot-red"></span><span class="dot dot-yellow"></span><span class="dot dot-green"></span></div><span class="mockup-title">Slice of Life</span></div>
<div class="mockup-body">
<div class="mockup-card">
<div class="mockup-card-icon"><img src="assets/icon.png" style="width:47px;height:47px;object-fit:contain;opacity:0.9;"></div>
<div class="mockup-card-title">BUILD YOUR VLOG</div>
<div class="mockup-card-desc">Drop in today's footage. A-roll, b-roll, captions &mdash; finished vlog in minutes.</div>
</div>
<div class="mockup-streak"><div class="mockup-streak-line"></div><span class="mockup-streak-label">7-DAY STREAK</span><div class="mockup-streak-line"></div></div>
<div class="mockup-thumbs">
<div class="mockup-thumb"><img src="assets/selfie-1.jpg"></div>
<div class="mockup-thumb"><img src="assets/selfie-2.jpg"></div>
<div class="mockup-thumb"><img src="assets/selfie-3.jpg"></div>
<div class="mockup-thumb"><img src="assets/selfie-4.jpg"></div>
</div>
</div>
</div></div>
<pre id="rects" style="position:fixed;left:0;top:0">PENDING</pre>
<script>
window.addEventListener('load',()=>{setTimeout(()=>{
 const win=document.querySelector('.mockup-window').getBoundingClientRect();
 const rel=(el)=>{const r=el.getBoundingClientRect();return{x:r.left-win.left,y:r.top-win.top,w:r.width,h:r.height};};
 const out={dpr:3,win:{w:win.width,h:win.height},
   card:rel(document.querySelector('.mockup-card')),
   thumbs:[...document.querySelectorAll('.mockup-thumb')].map(rel)};
 document.getElementById('rects').textContent=JSON.stringify(out);
},100);});
</script></body></html>
