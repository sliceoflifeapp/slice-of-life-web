<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;background:transparent}
.tb{width:460px;height:36px;background:#040F1D;display:flex;align-items:center;padding:0 14px;position:relative;font-family:'Montserrat',sans-serif;border-bottom:1px solid rgba(255,255,255,0.06);}
.dots{display:flex;gap:6px} .dot{width:11px;height:11px;border-radius:50%}
.r{background:#FF5F57}.y{background:#FEBC2E}.g{background:#28C840}
.title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;font-weight:500;color:rgba(120,170,230,0.85);display:flex;align-items:center;gap:6px}
.fi{width:13px;height:11px;background:rgba(120,170,230,0.85);border-radius:2px 2px 2px 2px;position:relative;}
.fi:before{content:'';position:absolute;top:-3px;left:0;width:6px;height:3px;background:rgba(120,170,230,0.85);border-radius:2px 2px 0 0;}
</style></head><body>
<div class="tb"><div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
<span class="title"><span class="fi"></span>Footage</span></div>
</body></html>
