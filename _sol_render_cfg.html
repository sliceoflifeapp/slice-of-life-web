<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box} html,body{margin:0;padding:0;background:transparent}
body{font-family:'Montserrat',system-ui,sans-serif;color:#fff}
.wrap{width:460px;padding:0}
.mockup-window{width:460px;height:365.67px;border-radius:14px;background:#040F1D;border:1px solid rgba(255,255,255,0.09);overflow:hidden;box-shadow:0 0 0 1px rgba(0,0,0,0.5);}
.mockup-titlebar{height:36px;background:rgba(255,255,255,0.025);border-bottom:1px solid rgba(255,255,255,0.055);display:flex;align-items:center;padding:0 14px;position:relative;}
.mockup-dots{display:flex;gap:6px;} .dot{width:11px;height:11px;border-radius:50%;}
.dot-red{background:#FF5F57;}.dot-yellow{background:#FEBC2E;}.dot-green{background:#28C840;}
.mockup-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;font-weight:500;color:rgba(80,128,192,0.7);}
.body{padding:11px 24px 13px;display:flex;flex-direction:column;align-items:center;gap:8px;height:calc(365.67px - 36px);}
.cfg-title{font-size:16px;font-weight:700;color:#FFF;text-transform:uppercase;letter-spacing:0.04em;line-height:1;white-space:nowrap;}
.cfg-sub{font-size:10px;color:#3A6090;margin-top:1px;}
.sec{width:100%;}
.dur-label{font-size:8.5px;font-weight:600;letter-spacing:0.09em;color:#7FB8FF;text-align:left;margin-bottom:5px;}
.pacing-toggle{display:flex;gap:7px;}
.pacing-btn{flex:1;padding:7px 6px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#3A6090;display:flex;align-items:center;justify-content:center;}
.pacing-btn.selected{background:rgba(30,95,200,0.2);border-color:rgba(91,158,240,0.5);color:#5B9EF0;}
.pacing-btn-label{font-size:12px;font-weight:600;}
.toggle-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#061422;border:1px solid rgba(255,255,255,0.08);border-radius:10px;}
.toggle-row-left{display:flex;flex-direction:column;gap:1px;text-align:left;}
.toggle-row-label{font-size:12px;font-weight:500;color:#B8D0EE;} .toggle-row-sub{font-size:9.5px;color:#3A6090;}
.toggle-switch{width:36px;height:20px;border-radius:10px;background:rgba(30,95,200,0.5);border:1px solid rgba(91,158,240,0.5);position:relative;flex-shrink:0;}
.toggle-switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#5B9EF0;top:2px;left:2px;transform:translateX(16px);}
.build-btn{width:100%;margin-top:auto;padding:11px;background:rgba(50,110,225,0.52);border:1px solid rgba(120,185,255,0.42);border-radius:12px;box-shadow:0 1px 0 rgba(255,255,255,0.22) inset,0 8px 24px rgba(30,80,200,0.35);color:#FFF;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;}
.play{width:0;height:0;border-left:9px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent;}
</style></head><body>
<div class="wrap"><div class="mockup-window">
<div class="mockup-titlebar"><div class="mockup-dots"><span class="dot dot-red"></span><span class="dot dot-yellow"></span><span class="dot dot-green"></span></div><span class="mockup-title">Slice of Life</span></div>
<div class="body">
<div class="cfg-title">CUSTOMIZE YOUR SLICE</div><div class="cfg-sub">Dial it in.</div>
<div class="sec"><div class="dur-label">NARRATION</div><div class="pacing-toggle">
<div class="pacing-btn selected"><span class="pacing-btn-label">Talk to camera</span></div>
<div class="pacing-btn"><span class="pacing-btn-label">Voiceover</span></div></div></div>
<div class="sec"><div class="dur-label">ORIENTATION</div><div class="pacing-toggle">
<div class="pacing-btn"><span class="pacing-btn-label">Vertical</span></div>
<div class="pacing-btn selected"><span class="pacing-btn-label">Landscape</span></div></div></div>
<div class="sec"><div class="dur-label">PACING</div><div class="pacing-toggle">
<div class="pacing-btn selected"><span class="pacing-btn-label">Tight</span></div>
<div class="pacing-btn"><span class="pacing-btn-label">Balanced</span></div>
<div class="pacing-btn"><span class="pacing-btn-label">Relaxed</span></div></div></div>
<div class="toggle-row"><div class="toggle-row-left"><div class="toggle-row-label">Captions</div><div class="toggle-row-sub">Burn subtitles into the video</div></div><div class="toggle-switch"></div></div>
<div class="build-btn"><span class="play"></span> Export my Slice</div>
</div></div></div>
<pre id="rects" style="position:fixed;left:0;top:0;opacity:0">x</pre><script>
window.addEventListener('load',()=>{setTimeout(()=>{
 const win=document.querySelector('.mockup-window').getBoundingClientRect();
 const rel=e=>{const r=e.getBoundingClientRect();return{x:+(r.left-win.left).toFixed(2),y:+(r.top-win.top).toFixed(2),w:+r.width.toFixed(2),h:+r.height.toFixed(2)};};
 const sel=[...document.querySelectorAll('.pacing-btn.selected')].map(rel);
 const out={win:{w:win.width,h:win.height},
   titlebar:rel(document.querySelector('.mockup-titlebar')),
   talk:sel[0], vertical:sel[1], tight:sel[2],
   btn:rel(document.querySelector('.build-btn')),
   sw:rel(document.querySelector('.toggle-switch'))};
 document.getElementById('rects').textContent=JSON.stringify(out);},150);});
</script>
</body></html>
